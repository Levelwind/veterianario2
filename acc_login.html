<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar Sistema Veterinario | Sistema Veterinario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/css/main.css">
  
<style>
  /* Ocultar TODOS los links auto-generados dentro de los campos del formulario */
  .auth-card form .mb-3 a[href*="password"],
  .auth-card form .mb-3 .helptext,
  .auth-card form .mb-3 .form-text {
    display: none !important;
  }
  /* Asegurar que nuestro link manual SÍ se muestre */
  .auth-card .forgot-link {
    display: block !important;
  }
</style>

</head>
<body>



<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-heart-pulse-fill text-primary me-2"></i>VetCare</a>
    <div class="ms-auto d-flex gap-2">
      <a href="/cuentas/account/login/" class="btn btn-outline-primary btn-sm">Iniciar Sesión</a>
      <a href="/registro/" class="btn btn-primary btn-sm">Registrarse</a>
    </div>
  </div>
</nav>
<div class="container py-4">
  
  
<div class="auth-wrapper py-5">
  <div class="auth-card mx-auto shadow-lg" style="max-width: 450px;">
    
    <div class="text-center mb-4">
      <i class="bi bi-heart-pulse-fill text-primary" style="font-size: 3rem;"></i>
      <h2 class="fw-bold mt-2 text-dark">VetCare</h2>
      <p class="text-muted mb-0">Ingresa a tu cuenta para continuar.</p>
    </div>

    <!-- Feedback del Wizard de MFA (Multi-factor Auth) -->
    
      <!-- Formulario normal -->
    

    <form action="" method="post" class="needs-validation" novalidate>
      <input type="hidden" name="csrfmiddlewaretoken" value="Qz5FOVYxhxw8GQVpDYnP4JxqM1Ti8RQNjLRcJdIsiZAvrhhU0EgphINisPRlC3ns">
      <input type="hidden" name="login_view-current_step" value="auth" id="id_login_view-current_step">
      
      <!-- Renderiza cada campo manualmente para evitar links duplicados -->
      
        <div class="mb-3">
          
            <label for="id_auth-username" class="form-label">Email</label>
          
          
            <input type="text" name="auth-username" autofocus autocapitalize="none" autocomplete="username" maxlength="254" required id="id_auth-username">
          
          
        </div>
      
        <div class="mb-3">
          
            <label for="id_auth-password" class="form-label">Contraseña</label>
          
          
            <input type="password" name="auth-password" autocomplete="current-password" required id="id_auth-password">
          
          
        </div>
      

      

      
        <div class="mb-3">
          <a class="forgot-link small text-decoration-none" href="/cuentas/password/reset/">¿Olvidaste tu contraseña?</a>
        </div>
      

      
      <input type="submit" value="" hidden />

      <!-- Opciones alternativas de MFA -->
      

      <div class="d-grid mt-4">
        
          <button class="btn btn-primary btn-lg" type="submit">
            Iniciar Sesión <i class="bi bi-arrow-right-short"></i>
          </button>
        
      </div>
    </form>

    <!-- Social Auth y alternativas SOLO en el primer paso -->
    
      <div class="divider my-4 d-flex align-items-center">
        <hr class="flex-grow-1 border-secondary opacity-25">
        <span class="px-3 text-muted small">O CONTINÚA CON</span>
        <hr class="flex-grow-1 border-secondary opacity-25">
      </div>

      <div class="d-grid gap-3">
        <!-- Reemplazar los placeholders por /cuentas/google/login/ en el proyecto real de allauth -->
        <a href="/cuentas/google/login/" class="btn btn-outline-dark d-flex align-items-center justify-content-center gap-2 py-2">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="20">
          Google
        </a>
        <a href="/cuentas/facebook/login/" class="btn btn-outline-primary d-flex align-items-center justify-content-center gap-2 py-2">
          <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook" width="20">
          Facebook
        </a>
      </div>
      
      <div class="text-center mt-4 pt-3 border-top pb-2">
        <p class="text-muted small mb-1">¿No tienes cuenta?</p>
        <a href="/registro/" class="text-decoration-none fw-semibold">
          Regístrate como Cliente
        </a>
      </div>
    

    <!-- Tokens de recuperación para 2FA -->
    
      
    

  </div>
</div>


</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>

</body>
</html>
